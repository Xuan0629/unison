name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-timeout

      - name: Run tests
        run: |
          PYTHONPATH=src:$PYTHONPATH python -m pytest tests/ -v --timeout=30 \
            --deselect tests/test_lock.py::TestFileLockManager::test_concurrent_acquire
