version: "2.0"
project_root: "."
agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-developer.md"
    task_instruction: "Fix 6 L1 issues in orchestrator.py per prd/PRD.md: (1) parallel dev halt check after runner.run(), (2) parallel dev budget check before runner.run(), (3) remove pre_invoke_cleanup from _invoke_multi_reviewer, (4) budget tracker preserve history by updating per_task_limit instead of recreating, (5) _save_checkpoint use explicit iter_n from loop, (6) DAG exec_stage validate pipeline_role=='developer'. pytest tests/test_orchestrator.py tests/test_custom_roles.py -q must pass. git add -A && git commit."
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-reviewer.md"
project:
  test_command: "python3 -m pytest tests/test_orchestrator.py tests/test_custom_roles.py -q"
  max_iterations: 2
