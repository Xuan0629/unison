version: "2.0"

project:
  language: python
  test_command: "pytest tests/ -v -x --timeout=30"

project_root: "../.."

mode: moa

moa:
  agents: 3
  rounds: 2
  runtime: claude
  model: deepseek-v4-pro

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/developer.md"
    pipeline_role: developer
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/reviewer.md"
    pipeline_role: reviewer

max_iterations: 1
per_agent_timeout: 600
