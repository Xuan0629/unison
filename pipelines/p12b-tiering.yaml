# P12b: Conditional Model Tiering
# Full pipeline: plan → discuss → dev
# P0 fixes validated — first feature pipeline after state isolation

version: "2.0"
mode: code-dev
project_root: ".."
per_agent_timeout: 900

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/developer-base.md"
    pipeline_role: developer
    task_instruction: "Implement conditional model tiering in Unison — three parts, commit each separately with tests:

(1) interfaces.py BudgetConfig: add `tier_upgrade: dict[str, dict[str,str]]` field (keys: from, to, reasoning_effort). Default empty dict.

(2) orchestrator.py _select_runner(): support downgrade_map entries that are LISTs for multi-hop chains. When first downgrade is exhausted, cascade to next entry.

(3) orchestrator.py: snapshot workspace before tier switch via SnapshotManager, restore on failure. Track _tier_snapshot_ids dict.

Reference: existing budget downgrade_map in interfaces.py, _select_runner() in orchestrator.py, SnapshotManager in snapshot.py."

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.6-terra
    system_prompt_path: "prompts/dev-reviewer.md"
    pipeline_role: reviewer

project:
  test_command: "pytest tests/ -q --ignore=tests/test_llm_integration.py --ignore=tests/test_observer.py --deselect tests/test_lock.py::TestFileLockManager::test_concurrent_acquire --deselect tests/test_reviewer_pool.py::TestExecuteParallel::test_parallel_execution_is_concurrent -x --timeout=15"
  max_dev_iterations: 3
  name: "p12b-tiering"
