version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    # <USER MUST FILL: your developer model, e.g., deepseek-v4-pro, claude-sonnet-4-6, gpt-5.5>
    model: "placeholder-dev-model"
    system_prompt_path: "prompts/developer-target.md"

  reviewer:
    role: reviewer
    runtime: codex
    # <USER MUST FILL: your reviewer model, e.g., gpt-5.5, claude-opus-4-8, deepseek-v4-pro>
    model: "placeholder-review-model"
    system_prompt_path: "prompts/reviewer-target.md"

project:
  # <USER MUST FILL: your test command, e.g., pytest tests/ -q, npm test>
  test_command: "echo placeholder-test-command"

# Optional: uncomment and fill in to set token budgets
# budget:
#   # <USER MUST FILL: daily token limit across all agents, e.g., 1000000>
#   daily_token_limit: 1000000
#   # <USER MUST FILL: per-agent-task token cap, e.g., 200000>
#   per_task_limit: 200000

# Optional: uncomment to customize snapshot retention
# snapshots:
#   enabled: true

# Optional: uncomment and fill in to enable risk matrix
# risk_matrix:
