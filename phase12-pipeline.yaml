# Phase 12: Hermes/OpenClaw Skill Auto-Maintenance (4-agent)
# Planner → Plan-Reviewer → Developer → Dev-Reviewer
version: "2.0"
project_root: "."

agents:
  planner:
    role: skill-auditor
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/skill-auditor-phase12.md"
    pipeline_role: planner
    task_instruction: "WRITE A COMPLETE PRD NOW. Do not write placeholders, stubs, or 'TBD'. Write at least 400 words covering: (1) scope: scan ~/.hermes/skills/ and ~/.openclaw/agents/, (2) audit dimensions: CLI command validity, file path validity, YAML frontmatter completeness, cross-reference integrity, (3) output format: a table with file/line/type/severity/details/fix columns, (4) constraints: read-only, no modifications. Start writing immediately."

  plan_reviewer:
    role: plan-reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/audit-reviewer-phase12.md"
    pipeline_role: reviewer

  developer:
    role: skill-auditor-dev
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/skill-auditor-phase12.md"
    pipeline_role: developer
    task_instruction: "Execute the skill health audit per prd/PRD.md and prd/tech-design.md. Write findings to reviews/skill-audit.md. Scan ~/.hermes/skills/ and ~/.openclaw/agents/ for outdated commands, missing paths, incomplete frontmatter, broken cross-references. Do NOT modify any skill files."

  dev_reviewer:
    role: dev-reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/audit-reviewer-phase12.md"
    pipeline_role: reviewer

project:
  test_command: "test -f reviews/skill-audit.md && echo 'audit exists'"
  max_iterations: 2

snapshots:
  enabled: true
  external_paths:
    - "~/.hermes/skills/"
    - "~/.openclaw/agents/"
