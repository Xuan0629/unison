version: '2.0'
project_root: .
agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: prompts/fix-developer.md
    task_instruction: Implement snapshot exclude_patterns per prd/PRD.md. Add exclude_patterns
      field to SnapshotConfig in interfaces.py (optional, default=['~/.hermes/.env',
      '~/.openclaw/**/auth-profiles.json']). Filter paths in snapshot.py before copying.
      Add test_sensitive_excluded to tests/test_snapshot.py. pytest tests/test_snapshot.py
      -q must pass (12+). git add -A && git commit.
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: prompts/fix-reviewer.md
project:
  test_command: python3 -m pytest tests/test_snapshot.py -q
  max_iterations: 2
