# Phase 9: OpenClaw Model Debug Skill (2-agent — PRD pre-written by Hermes)
version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/developer-phase9.md"
    task_instruction: "Read prd/PRD-phase9.md and prd/tech-design-phase9.md. Create ~/.openclaw/agents/openclaw-model-debug/SKILL.md — a diagnostic skill with ≥3 scenarios (unreachable, auth failure, timeout). SKILL.md is the deliverable (lives OUTSIDE this repo)."

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/reviewer-phase9.md"

project:
  test_command: "python3 -c \"import yaml; c=open('/home/sean/.openclaw/agents/openclaw-model-debug/SKILL.md').read(); p=c.split('---'); fm=yaml.safe_load(p[1]); print(f'OK: {fm.get(\\\"name\\\")} v{fm.get(\\\"version\\\")}')\""
  max_iterations: 3

snapshots:
  enabled: true
  external_paths:
    - "~/.openclaw/agents/openclaw-model-debug/"
