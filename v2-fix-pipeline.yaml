# Unison pipeline — V2 integration fix (2-agent mode)
# Task: process Codex review of 8 phases (all REQUEST_CHANGES), integrate V2
# modules into Orchestrator, run tests, get all 8 phases to PASS.
#
# We use 2-agent mode (Developer + Reviewer) instead of 4-agent because:
#   1. The "Planner" role has already been done by Hermes (wrote prd/PRD.md
#      and prd/tech-design.md from Codex's review findings).
#   2. Orchestrator's _should_plan() skips planning when no planner is
#      configured — this matches our setup.
#   3. Phase 7 finding is that _build_prompt is hand-built, not loading
#      system_prompt_path. Fixing that is the Developer's job (Phase 7
#      of the V2 fix), not the setup's job.
#
# Roles (2-agent mode):
#   - developer: Claude Code (deepseek-v4-pro @ api.deepseek.com/anthropic)
#   - reviewer:  Codex (gpt-5.5 @ 987xyz.com/v1)
#   - observer:  Hermes (qwen3.7-plus @ alibaba) — out-of-band, watches state
#
# Codex review of 8 phases:
#   ~/projects/unison/v2-review-codex.md

version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/developer-v2-fix.md"

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/reviewer-v2-fix.md"

project:
  test_command: "python3 -m pytest tests/ -q"
  max_iterations: 5

budget:
  max_tokens_per_agent: 200000
  max_total_tokens: 1500000

snapshots:
  enabled: true
  base_dir: "~/.unison/snapshots"

risk_matrix:
  enabled: true
  l2_audit_log: "observer/audit.jsonl"
