# Phase 10 Round 1: Plugin System Design Debate (4-agent)
# Architect(planner) ↔ Critic(reviewer) → Dev(finalize) → Reviewer
version: "2.0"
project_root: "."

agents:
  architect:
    role: architect
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/architect-phase10.md"
    pipeline_role: planner
    task_instruction: "Design a plugin system for Unison to support custom agent runtimes beyond the 4 hardcoded ones (claude/codex/hermes/openclaw). Write the proposal to prd/PRD.md and prd/tech-design.md. Cover: plugin interface, loading, configuration, CLI flag mapping, backward compatibility. Be specific with code snippets and YAML examples."

  critic:
    role: critic
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/critic-phase10.md"
    pipeline_role: reviewer

  finalizer:
    role: finalizer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/finalizer-phase10.md"
    pipeline_role: developer
    task_instruction: "The PRD and tech-design are already approved by the Critic. Just confirm they exist and write a one-line summary. git add -A && git commit -m 'finalize: plugin design proposal approved'"

project:
  test_command: "test -f prd/PRD.md && test -f prd/tech-design.md && echo 'proposal exists'"
  max_iterations: 3
