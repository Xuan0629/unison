# Phase 10 Round 1: Plugin System Design Debate (4-agent)
# Architect(planner) ↔ Critic(reviewer) → Dev(finalize) → Reviewer
version: "2.0"
project_root: "."

agents:
  architect:
    role: architect
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/architect-phase10.md"
    pipeline_role: planner
    task_instruction: "WRITE A COMPLETE plugin system design NOW. Do NOT write placeholders or stubs. Write at least 500 words to prd/PRD.md covering: (1) Python plugin interface class with method signatures, (2) YAML config example showing custom runtime, (3) plugin loading mechanism, (4) backward compatibility proof showing existing pipeline.yaml still works, (5) error handling for missing/broken plugins. Include actual code snippets. Start immediately."

  critic:
    role: critic
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/critic-phase10.md"
    pipeline_role: reviewer

  finalizer:
    role: finalizer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/finalizer-phase10.md"
    pipeline_role: developer
    task_instruction: "The PRD and tech-design are already approved by the Critic. Just confirm they exist and write a one-line summary. git add -A && git commit -m 'finalize: plugin design proposal approved'"

project:
  test_command: "test -f prd/PRD.md && test -f prd/tech-design.md && echo 'proposal exists'"
  max_iterations: 3
