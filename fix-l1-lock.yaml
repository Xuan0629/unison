# Fix L2 #1: Lock TOCTOU → flock (2-agent — PRD pre-written)
version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-developer.md"
    task_instruction: "Implement fcntl.flock-based locking per prd/PRD.md. Modify src/unison/lock.py only. Add import fcntl. acquire() uses os.open + fcntl.flock(LOCK_EX|LOCK_NB). release() uses fcntl.flock(LOCK_UN) + os.close + unlink. is_locked() probes with a test fd. Fall back to existing PID-file logic if fcntl unavailable or EAGAIN. Add test_concurrent_acquire to tests/test_lock.py. pytest tests/test_lock.py -q must pass (16+). git add -A && git commit."

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-reviewer.md"

project:
  test_command: "python3 -m pytest tests/test_lock.py -q"
  max_iterations: 3
