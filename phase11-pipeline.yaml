# Unison pipeline — Phase 11: Custom Role Framework
version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/developer-phase11.md"
    task_instruction: "Read prd/PRD-phase11.md and prd/tech-design-phase11.md. Implement the 3 changes: (1) interfaces.py: AgentRole=str, AgentSpec +pipeline_role +task_instruction +effective_role, (2) pipeline.py: VALID_ROLES=empty, REQUIRED_PIPELINE_ROLES, _build_agents +pipeline_role, (3) orchestrator.py: _should_plan uses effective_role, DAG exec_stage uses stage.agents, _invoke_agent_for_role accepts effective_role. Add tests/test_custom_roles.py with 6+ tests. Run pytest tests/ -q (must stay >=491). git add -A && git commit."

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/reviewer-phase11.md"

project:
  test_command: "python3 -m pytest tests/ -q"
  max_iterations: 5

budget:
  max_tokens_per_agent: 200000
  max_total_tokens: 1000000

snapshots:
  enabled: true
  base_dir: "~/.unison/snapshots"

risk_matrix:
  enabled: true
  l2_audit_log: "observer/audit.jsonl"
