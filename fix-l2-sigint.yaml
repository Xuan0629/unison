# Fix L2 #2: SIGINT handler (2-agent)
version: "2.0"
project_root: "."

agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-developer.md"
    task_instruction: "Add SIGINT/SIGTERM handlers per prd/PRD.md. Modify src/unison/orchestrator.py only: add import signal, register signal.signal(signal.SIGINT, ...) and signal.signal(signal.SIGTERM, ...) in __init__ that call self.halt('SIGINT') or self.halt('SIGTERM'). pytest tests/test_orchestrator.py -q must pass. git add -A && git commit."

  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-reviewer.md"

project:
  test_command: "python3 -m pytest tests/test_orchestrator.py -q"
  max_iterations: 2
