version: '2.0'
project_root: .
agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: prompts/fix-developer.md
    task_instruction: Implement log key masking per prd/PRD.md. Add mask_secrets()
      function that scans text for API key patterns (sk-..., Bearer ..., api_key=...)
      and replaces with [REDACTED]. Use in all runner log writing. Add to src/unison/runners/base.py
      or new utils.py. pytest tests/test_orchestrator.py -q must pass. git add -A
      && git commit.
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: prompts/fix-reviewer.md
project:
  test_command: python3 -m pytest tests/test_orchestrator.py -q
  max_iterations: 2
