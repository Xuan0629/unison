version: "2.0"
project_root: "."

agents:
  architect:
    role: architect
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-planner.md"
    pipeline_role: planner
    task_instruction: "WRITE a detailed technical design for Unison web UI 2.0 per PRD at prd/PRD-webui-v2.md. Cover: (1) exact HTML/CSS/JS structure, (2) /api/state data format with all fields, (3) how each component maps from state data, (4) language pack format, (5) CSS variable theme system, (6) JS partial-update logic. Write design to prd/PRD.md and prd/tech-design.md. Be specific — show code snippets for key parts."

  pm:
    role: pm
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-planner.md"
    pipeline_role: planner
    task_instruction: "EVALUATE the Architect's web UI design for feasibility. Check: (1) can all 9 components be built in a single webui.py without external deps? (2) estimated lines of code, (3) data availability — does state.json + budget.json provide all needed data? (4) edge cases: empty state, missing budget, no agents. Write feasibility assessment to prd/feasibility.md."

  critic:
    role: critic
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-reviewer.md"
    pipeline_role: reviewer

  noop:
    role: noop
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-developer.md"
    pipeline_role: developer
    task_instruction: "The design is complete. Just confirm it exists. git add -A && git commit -m 'design-debate complete'"

project:
  test_command: "test -f prd/PRD.md && test -f prd/tech-design.md && echo 'design exists'"
  max_iterations: 3
