version: "2.0"
project_root: "."
agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: "prompts/fix-developer.md"
    task_instruction: "Implement 6 named pipeline modes per prd/PRD.md. Changes: (1) interfaces.py: add PipelineMode Literal + mode field to PipelineSpec, (2) pipeline.py: auto-detect mode in load(), (3) orchestrator.py: replace binary _should_plan with mode dispatch table in _run_state_machine, add _run_planning_loop/_run_dev_loop/_run_review_only helpers, (4) cli.py: mode subcommand shows name. Keep ~500 tests green. git add -A && git commit."
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: "prompts/fix-reviewer.md"
project:
  test_command: "python3 -m pytest tests/test_orchestrator.py tests/test_pipeline.py tests/test_custom_roles.py -q"
  max_iterations: 3
