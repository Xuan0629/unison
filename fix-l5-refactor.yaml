version: '2.0'
project_root: .
agents:
  developer:
    role: developer
    runtime: claude
    model: deepseek-v4-pro
    system_prompt_path: prompts/fix-developer.md
    task_instruction: Refactor runners per prd/PRD.md. Create BaseRunner in src/unison/runners/base.py
      with shared subprocess.run, timeout handling, log writing, AgentResult construction.
      Make ClaudeRunner, CodexRunner, HermesRunner subclass BaseRunner with only binary
      name overrides. Keep OpenClawRunner unchanged. pytest tests/ -q must pass (all
      500+ tests). git add -A && git commit.
  reviewer:
    role: reviewer
    runtime: codex
    model: gpt-5.5
    system_prompt_path: prompts/fix-reviewer.md
project:
  test_command: python3 -m pytest tests/test_orchestrator.py tests/test_custom_roles.py
    -q
  max_iterations: 2
